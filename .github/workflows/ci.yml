name: CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   test:
      runs-on: ubuntu-latest

      services:
         postgres:
            image: postgres:16
            env:
               POSTGRES_USER: postgres
               POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
               POSTGRES_DB: folio_test
            ports:
               - 5432:5432
            options: >-
               --health-cmd pg_isready
               --health-interval 10s
               --health-timeout 5s
               --health-retries 5

      steps:
         - uses: actions/checkout@v4

         - uses: actions/setup-node@v4
           with:
              node-version: 22
              cache: 'npm'

         - name: Install dependencies
           run: npm ci

         - name: Run Vitest
           run: npm run test
           env:
              DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@localhost:5432/folio_test

         - name: Install Playwright browsers
           run: npx playwright install --with-deps chromium

         - name: Run Playwright
           run: npx playwright test
           env:
              DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@localhost:5432/folio_test
